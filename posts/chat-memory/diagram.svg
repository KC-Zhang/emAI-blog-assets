<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="960" height="620" rx="12" fill="#fafafa"/>

  <!-- Title -->
  <text x="480" y="44" text-anchor="middle" font-size="28" font-weight="700" fill="#111">How AI Chat Memory Works</text>
  <text x="480" y="70" text-anchor="middle" font-size="16" fill="#64748b">A rolling window of summarized memos + recent raw messages</text>

  <!-- ==================== TIMELINE ==================== -->
  
  <text x="60" y="110" font-size="16" font-weight="700" fill="#111">Conversation Timeline</text>
  <text x="60" y="130" font-size="14" fill="#64748b">Each batch = 8 messages</text>
  
  <text x="880" y="110" text-anchor="end" font-size="14" font-weight="600" fill="#94a3b8">time →</text>

  <!-- 1. Forgotten -->
  <rect x="60" y="145" width="100" height="32" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
  <text x="66" y="166" font-size="14" fill="#cbd5e1">💬💬💬💬</text>

  <line x1="110" y1="177" x2="110" y2="195" stroke="#e2e8f0" stroke-width="2"/>
  <polygon points="106,195 114,195 110,202" fill="#e2e8f0"/>

  <rect x="60" y="202" width="100" height="32" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
  <text x="72" y="223" font-size="14" fill="#94a3b8" text-decoration="line-through">📝 Memo 4</text>
  <text x="110" y="252" text-anchor="middle" font-size="12" font-style="italic" fill="#cbd5e1">expired</text>

  <!-- 2. Rolling Window (15 Kept Memos) -->
  <rect x="180" y="130" width="460" height="114" rx="8" fill="none" stroke="#fdba74" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="190" y="122" font-size="14" font-weight="600" fill="#ea580c">Rolling window: Last 15 batches summarized</text>
  <text x="635" y="122" text-anchor="end" font-size="14" fill="#f97316">window slides ▸</text>

  <!-- Memo 5 -->
  <rect x="196" y="145" width="100" height="32" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="202" y="166" font-size="14" fill="#64748b">💬💬💬💬</text>

  <line x1="246" y1="177" x2="246" y2="195" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="242,195 250,195 246,202" fill="#94a3b8"/>

  <rect x="196" y="202" width="100" height="32" rx="4" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
  <text x="218" y="223" font-size="14" font-weight="600" fill="#475569">📝 Memo 5</text>

  <!-- Memo 6 -->
  <rect x="310" y="145" width="100" height="32" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="316" y="166" font-size="14" fill="#64748b">💬💬💬💬</text>

  <line x1="360" y1="177" x2="360" y2="195" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="356,195 364,195 360,202" fill="#94a3b8"/>

  <rect x="310" y="202" width="100" height="32" rx="4" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
  <text x="332" y="223" font-size="14" font-weight="600" fill="#475569">📝 Memo 6</text>

  <!-- Dots -->
  <text x="438" y="196" font-size="24" fill="#94a3b8">···</text>

  <!-- Memo 19 -->
  <rect x="490" y="145" width="100" height="32" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="496" y="166" font-size="14" fill="#64748b">💬💬💬💬</text>

  <line x1="540" y1="177" x2="540" y2="195" stroke="#ea580c" stroke-width="2"/>
  <polygon points="535,195 545,195 540,203" fill="#ea580c"/>

  <rect x="490" y="202" width="100" height="32" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="506" y="223" font-size="13" font-weight="700" fill="#9a3412">📝 Memo 19</text>

  <!-- 3. Current Working Memory -->
  <rect x="660" y="130" width="220" height="114" rx="8" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="670" y="122" font-size="14" font-weight="600" fill="#2563eb">Current working memory</text>

  <rect x="720" y="145" width="100" height="32" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="726" y="166" font-size="14" fill="#2563eb">💬💬💬💬</text>

  <line x1="770" y1="177" x2="770" y2="195" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="765,195 775,195 770,203" fill="#3b82f6"/>

  <rect x="680" y="202" width="180" height="32" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="770" y="223" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">💬 Sent Raw</text>

  <!-- ==================== ARROWS DOWN TO PROMPT ==================== -->
  
  <path d="M 410 244 L 410 270 L 370 270 L 370 290" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <path d="M 770 244 L 770 270 L 370 270" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="364,290 376,290 370,298" fill="#94a3b8"/>
  
  <!-- Backing for text to hide the line behind it -->
  <rect x="230" y="258" width="280" height="24" fill="#fafafa"/>
  <text x="370" y="275" text-anchor="middle" font-size="14" font-weight="600" fill="#64748b">memos + raw messages feed into ▼</text>

  <!-- ==================== PROMPT STACK & DETAILS ==================== -->
  
  <g transform="translate(100, 305)">
    <rect x="0" y="0" width="540" height="158" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="16" y="26" font-size="16" font-weight="700" fill="#111">Prompt Stack (What the LLM sees)</text>

    <!-- Layers -->
    <rect x="12" y="38" width="516" height="20" rx="4" fill="#dbeafe"/>
    <text x="24" y="52" font-size="13" fill="#1e40af">🛡️ System prompt</text>
    <text x="464" y="52" font-size="11" font-weight="700" fill="#16a34a">CACHED</text>

    <rect x="12" y="62" width="516" height="20" rx="4" fill="#f3e8ff"/>
    <text x="24" y="76" font-size="13" fill="#7e22ce">🎭 Character info</text>
    <text x="464" y="76" font-size="11" font-weight="700" fill="#16a34a">CACHED</text>

    <rect x="12" y="86" width="516" height="20" rx="4" fill="#fff1f2"/>
    <text x="24" y="100" font-size="13" fill="#be123c">📝 Last 15 Memos</text>
    <text x="464" y="100" font-size="11" font-weight="700" fill="#16a34a">CACHED</text>

    <rect x="12" y="110" width="516" height="20" rx="4" fill="#ecfdf5"/>
    <text x="24" y="124" font-size="13" fill="#065f46">💬 Last 8 messages</text>

    <rect x="12" y="134" width="516" height="20" rx="4" fill="#fefce8"/>
    <text x="24" y="148" font-size="13" fill="#854d0e">✉️ New user message</text>
  </g>

  <!-- Memo Details Panel -->
  <g transform="translate(660, 305)">
    <rect x="0" y="0" width="240" height="148" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    
    <text x="14" y="24" font-size="13" font-weight="700" fill="#475569">Inside each memo</text>
    <text x="14" y="44" font-size="12" fill="#64748b">💛 Relationship progression</text>
    <text x="14" y="62" font-size="12" fill="#64748b">⭐ Significant milestones</text>
    <text x="14" y="80" font-size="12" fill="#64748b">🎁 Notable items &amp; keepsakes</text>
    <text x="14" y="98" font-size="12" fill="#64748b">🔀 Story turning points</text>

    <line x1="10" y1="110" x2="230" y2="110" stroke="#e2e8f0" stroke-width="1.5"/>
    
    <text x="14" y="128" font-size="11" font-weight="700" fill="#991b1b">Example output:</text>
    <text x="14" y="142" font-size="10" fill="#334155">【Highlight】: Named stray cat "Mochi"</text>
  </g>

  <!-- ==================== RESPONSE & LOOP ==================== -->

  <!-- Arrow down to response -->
  <line x1="370" y1="463" x2="370" y2="483" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="364,483 376,483 370,491" fill="#94a3b8"/>

  <!-- Response -->
  <rect x="210" y="492" width="320" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="370" y="518" text-anchor="middle" font-size="16" font-weight="600" fill="#166534">✅ AI responds with full context</text>

  <!-- Arrow down to memory creation -->
  <line x1="370" y1="532" x2="370" y2="552" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="364,552 376,552 370,560" fill="#94a3b8"/>

  <!-- Memory Creation -->
  <rect x="150" y="561" width="440" height="44" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="370" y="588" text-anchor="middle" font-size="14" font-weight="600" fill="#991b1b">🔄 Every 8 msgs: async summarize to new memo</text>

  <!-- Loop arrow -->
  <path d="M 590 583 L 645 583 L 645 218 L 600 218" fill="none" stroke="#f87171" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="602,212 602,224 594,218" fill="#f87171"/>

</svg>
